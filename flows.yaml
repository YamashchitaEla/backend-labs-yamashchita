            openid: OpenID scope
        implicit:
          authorizationUrl: "http://127.0.0.1:8080/realms/Rikaenzhela/protocol/openid-connect/auth"
          tokenUrl: "http://127.0.0.1:8080/realms/Rikaenzhela/protocol/openid-connect/token"
          scopes:
            openid: OpenID scope
        password:
          tokenUrl: "http://127.0.0.1:8080/realms/Rikaenzhela/protocol/openid-connect/token"
          scopes:
            openid: OpenID scope
        clientCredentials:
          tokenUrl: "http://127.0.0.1:8080/realms/Rikaenzhela/protocol/openid-connect/token"
          scopes:
            openid: OpenID scope

security:
  - oauth2: []