openapi: 3.0.3
info:
  title: OAuth2 Test API
  version: 1.0.0

paths:
  /test:
    get:
      summary: Test endpoint
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

